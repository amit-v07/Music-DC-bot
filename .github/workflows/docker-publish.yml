# Build and push the app image to GitHub Container Registry (GHCR).
# Use this if you want Watchtower (or another host) to pull a pre-built image
# instead of building on the server.
#
# Triggers: manual (workflow_dispatch) or git tags matching v* (e.g. v1.2.0).
#
# After publishing, point docker-compose at the image and run pull + up on the server,
# or let Watchtower restart when the :latest tag changes.

name: Publish image (GHCR)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Image name (GHCR must be lowercase)
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
